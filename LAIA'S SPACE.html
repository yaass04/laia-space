<script>
'use strict';

/* ─── CONSTANTS ─────────────────────────────────────────────── */
const MESOS     = ['Gener','Febrer','Març','Abril','Maig','Juny','Juliol','Agost','Setembre','Octubre','Novembre','Desembre'];
const DIES      = ['Diumenge','Dilluns','Dimarts','Dimecres','Dijous','Divendres','Dissabte'];
const DIES7     = ['Dg','Dl','Dt','Dc','Dj','Dv','Ds'];
const MISSATGES = ['🐾 Bau!','💛 Klaus t\'estima!','🐕 Bon gos!','✨ Hola Laia!','🦴 Tasques fetes?'];

/* Fase 1 — definició de tags */
const TAGS = {
  treball : { label:'Treball',  emoji:'💼', color:'#4A7EC0' },
  personal: { label:'Personal', emoji:'👤', color:'#9060C0' },
  casa    : { label:'Casa',     emoji:'🏠', color:'#50A060' },
  compres : { label:'Compres',  emoji:'🛒', color:'#C07830' },
  salut   : { label:'Salut',    emoji:'❤️', color:'#C04060' },
  klaus   : { label:'Klaus',    emoji:'🐾', color:'#C8922A' },
};

/* Fase 1 v2 — estats de tasca */
const STATES = {
  todo      : { label:'Per fer',    icon:'○', color:'rgba(255,255,255,0.55)', bg:'rgba(255,255,255,0.07)',  border:'rgba(255,255,255,0.18)' },
  inprogress: { label:'En curs',    icon:'◑', color:'#60A5FA',               bg:'rgba(59,130,246,0.14)',   border:'rgba(59,130,246,0.4)'   },
  inreview  : { label:'En revisió', icon:'◐', color:'#C084FC',               bg:'rgba(168,85,247,0.14)',   border:'rgba(168,85,247,0.4)'   },
  done      : { label:'Feta',       icon:'●', color:'#4ADE80',               bg:'rgba(74,222,128,0.14)',   border:'rgba(74,222,128,0.4)'   },
};

/* Fase 1 v2 — prioritats (4 nivells) */
const PRIORITIES = {
  low   : { label:'Baixa',  icon:'↓', color:'#4ADE80', bg:'rgba(74,222,128,0.12)',  border:'rgba(74,222,128,0.35)'  },
  normal: { label:'Normal', icon:'–', color:'#94A3B8', bg:'rgba(148,163,184,0.1)',  border:'rgba(148,163,184,0.3)'  },
  high  : { label:'Alta',   icon:'↑', color:'#FB923C', bg:'rgba(251,146,60,0.12)',  border:'rgba(251,146,60,0.35)'  },
  urgent: { label:'Urgent', icon:'‼', color:'#FF5C5C', bg:'rgba(255,92,92,0.12)',   border:'rgba(255,92,92,0.4)'    },
};

/* Sort options */
const SORT_OPTIONS = {
  created : 'Creació',
  due     : 'Data límit',
  priority: 'Prioritat',
  state   : 'Estat',
  alpha   : 'A–Z',
};

/* ─── UTILS ──────────────────────────────────────────────────── */
const $   = id => document.getElementById(id);
const pad = n  => String(n).padStart(2, '0');
function dateStr(d) { return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function today()    { return dateStr(new Date()); }
function fmtShort(s) { if (!s) return ''; const [,m,d] = s.split('-'); return `${d}/${m}`; }

function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

function renderHeaderDate() {
  const now = new Date();
  $('header-date').innerHTML =
    `<div class="hd-num">${now.getDate()}</div>
     <div class="hd-info">${MESOS[now.getMonth()]} · ${DIES[now.getDay()]}</div>`;
}

/* ─── CALENDAR ───────────────────────────────────────────────── */
const Calendar = {
  viewDate   : new Date(),
  selectedDay: null,

  render() {
    const y = this.viewDate.getFullYear(), m = this.viewDate.getMonth();
    const grid = $('cal-grid'), tod = today(), todos = DB.getTodos();
    $('cal-label').textContent = `${MESOS[m]} ${y}`;
    grid.innerHTML = '';
    DIES7.forEach(d => { const el = document.createElement('div'); el.className='cal-dname'; el.textContent=d; grid.appendChild(el); });
    const firstDow = new Date(y,m,1).getDay(), daysInMo = new Date(y,m+1,0).getDate(), prevDays = new Date(y,m,0).getDate();
    for (let i=firstDow-1; i>=0; i--) { const el=document.createElement('div'); el.className='cal-day other'; el.textContent=prevDays-i; grid.appendChild(el); }
    for (let d=1; d<=daysInMo; d++) {
      const ds = `${y}-${pad(m+1)}-${pad(d)}`;
      const el = document.createElement('div');
      el.className='cal-day'; el.textContent=d;
      if (ds===tod)              el.classList.add('today');
      if (ds===this.selectedDay) el.classList.add('sel');
      if (todos.some(t=>t.date===ds)) el.classList.add('has-t');
      el.addEventListener('click', () => this.pickDay(ds));
      grid.appendChild(el);
    }
    const total=firstDow+daysInMo, rem=total%7===0?0:7-(total%7);
    for (let d=1; d<=rem; d++) { const el=document.createElement('div'); el.className='cal-day other'; el.textContent=d; grid.appendChild(el); }
  },

  pickDay(ds) {
    this.selectedDay = ds;
    this.render();
    const todos = DB.getTodosByDate(ds);
    const [y,m,d] = ds.split('-');
    const pend = todos.filter(t=>!t.completed).length;
    $('sel-info').textContent = todos.length===0
      ? `${d}/${m}/${y} — cap tasca encara`
      : `${d}/${m}/${y} — ${todos.length} tasca${todos.length>1?'ques':''}, ${pend} activa${pend!==1?'ques':''}`;
    $('quick-add').style.display='flex';
    $('qa-input').focus();
    Todos.setFilter('day', false);
  },

  prevMonth() { this.viewDate = new Date(this.viewDate.getFullYear(), this.viewDate.getMonth()-1, 1); this.render(); },
  nextMonth() { this.viewDate = new Date(this.viewDate.getFullYear(), this.viewDate.getMonth()+1, 1); this.render(); },

  quickAdd() {
    const inp = $('qa-input'), text = inp.value.trim();
    if (!text || !this.selectedDay) return;
    DB.addTodo(text, this.selectedDay);
    inp.value = '';
    refresh();
    toast('🐾 Tasca afegida per al ' + fmtShort(this.selectedDay));
  },
};

/* ─── TODOS ──────────────────────────────────────────────────── */
const Todos = {
  stateFilter : 'all',   // all/todo/inprogress/inreview/done/overdue/today/day
  sortBy      : 'created',
  sortAsc     : true,
  activeTag   : null,
  _selTags    : [],
  _selColor   : '',
  view        : 'list',  // 'list' | 'kanban'
  searchQuery : '',

  /* ── Update sf-btn chip counts ──────────────────────────── */
  updateFilterCounts() {
    const todos = DB.getTodos();
    const tod   = today();
    const counts = {
      all       : todos.length,
      todo      : todos.filter(t => t.state==='todo').length,
      inprogress: todos.filter(t => t.state==='inprogress').length,
      inreview  : todos.filter(t => t.state==='inreview').length,
      done      : todos.filter(t => t.state==='done').length,
      overdue   : todos.filter(t => t.state!=='done' && t.date && t.date < tod).length,
      today     : todos.filter(t => t.date===tod).length,
    };
    document.querySelectorAll('.sf-btn').forEach(btn => {
      const f   = btn.dataset.sf;
      const cnt = btn.querySelector('.sf-count');
      if (cnt) cnt.textContent = counts[f] ?? '';
      btn.classList.toggle('active', f === this.stateFilter);
    });
  },

  /* ── Inline state badge ─────────────────────────────────── */
  makeStateBadge(todo) {
    const s    = STATES[todo.state] || STATES.todo;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;display:inline-block';

    const badge = document.createElement('button');
    badge.className = 'state-badge';
    badge.style.cssText = `color:${s.color};background:${s.bg};border-color:${s.border}`;
    badge.innerHTML = `<span>${s.icon}</span> ${s.label}`;

    const menu = document.createElement('div');
    menu.className = 'state-menu';

    Object.entries(STATES).forEach(([key, st]) => {
      const opt = document.createElement('button');
      opt.className = 'state-opt' + (todo.state===key ? ' active' : '');
      opt.style.cssText = `color:${st.color}`;
      opt.innerHTML = `<span>${st.icon}</span> ${st.label}`;
      opt.addEventListener('click', e => {
        e.stopPropagation();
        DB.setState(todo.id, key);
        if (key === 'done') launchConfetti();
        menu.classList.remove('open');
        refresh();
      });
      menu.appendChild(opt);
    });

    badge.addEventListener('click', e => {
      e.stopPropagation();
      document.querySelectorAll('.state-menu.open,.prio-menu.open').forEach(m => {
        if (m !== menu) m.classList.remove('open');
      });
      menu.classList.toggle('open');
    });

    wrap.appendChild(badge);
    wrap.appendChild(menu);
    return wrap;
  },

  /* ── Inline priority badge ──────────────────────────────── */
  makePrioBadge(todo) {
    const p    = PRIORITIES[todo.priority] || PRIORITIES.normal;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;display:inline-block';

    const badge = document.createElement('button');
    badge.className = 'prio-badge';
    badge.style.cssText = `color:${p.color};background:${p.bg};border-color:${p.border}`;
    badge.innerHTML = `<span>${p.icon}</span> ${p.label}`;

    const menu = document.createElement('div');
    menu.className = 'prio-menu';

    Object.entries(PRIORITIES).forEach(([key, pr]) => {
      const opt = document.createElement('button');
      opt.className = 'prio-opt' + (todo.priority===key ? ' active' : '');
      opt.style.cssText = `color:${pr.color}`;
      opt.innerHTML = `<span>${pr.icon}</span> ${pr.label}`;
      opt.addEventListener('click', e => {
        e.stopPropagation();
        DB.updateTodo(todo.id, { priority: key });
        menu.classList.remove('open');
        refresh();
      });
      menu.appendChild(opt);
    });

    badge.addEventListener('click', e => {
      e.stopPropagation();
      document.querySelectorAll('.state-menu.open,.prio-menu.open').forEach(m => {
        if (m !== menu) m.classList.remove('open');
      });
      menu.classList.toggle('open');
    });

    wrap.appendChild(badge);
    wrap.appendChild(menu);
    return wrap;
  },

  /* ── Tag / color selection in add form ──────────────────── */
  toggleAddTag(tag) {
    const i = this._selTags.indexOf(tag);
    if (i >= 0) this._selTags.splice(i, 1);
    else this._selTags.push(tag);
    document.querySelectorAll('.tag-toggle').forEach(b =>
      b.classList.toggle('active', this._selTags.includes(b.dataset.tag))
    );
  },

  selectColor(color) {
    this._selColor = color;
    document.querySelectorAll('#color-picker .color-dot').forEach(d =>
      d.classList.toggle('sel', d.dataset.color === color)
    );
  },

  resetForm() {
    $('todo-input').value    = '';
    $('todo-date').value     = '';
    $('todo-time').value     = '';
    $('todo-priority').value = 'normal';
    $('todo-state').value    = 'todo';
    $('todo-list').value     = '';
    const asel = $('todo-assignee'); if (asel) asel.value = '';
    this._selTags  = [];
    this._selColor = '';
    document.querySelectorAll('.tag-toggle').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('#color-picker .color-dot').forEach(d => d.classList.toggle('sel', d.dataset.color===''));
  },

  /* ── Tag filter row ─────────────────────────────────────── */
  renderTagFilterRow() {
    const row = $('tag-filter-row');
    if (!row) return;
    row.innerHTML = '';
    Object.entries(TAGS).forEach(([key, t]) => {
      const btn = document.createElement('button');
      btn.className   = 'tag-filter-btn' + (this.activeTag===key ? ' active' : '');
      btn.dataset.tag = key;
      btn.textContent = `${t.emoji} ${t.label}`;
      btn.style.cssText = `color:${t.color};border-color:${t.color}44`;
      btn.addEventListener('click', () => {
        this.activeTag = this.activeTag===key ? null : key;
        this.renderTagFilterRow();
        this.render();
      });
      row.appendChild(btn);
    });
  },

  /* ── Paw checkbox ───────────────────────────────────────── */
  makePawChk(id, checked) {
    const div = document.createElement('div');
    div.className = `chk${checked?' on':''}`;
    div.innerHTML = `<svg viewBox="0 0 100 100">
      <ellipse class="paw-empty" cx="50" cy="63" rx="24" ry="20"/>
      <ellipse class="paw-empty" cx="19" cy="43" rx="12" ry="14"/>
      <ellipse class="paw-empty" cx="37" cy="28" rx="12" ry="14"/>
      <ellipse class="paw-empty" cx="63" cy="28" rx="12" ry="14"/>
      <ellipse class="paw-empty" cx="81" cy="43" rx="12" ry="14"/>
      <ellipse class="paw-full"  cx="50" cy="63" rx="24" ry="20"/>
      <ellipse class="paw-full"  cx="19" cy="43" rx="12" ry="14"/>
      <ellipse class="paw-full"  cx="37" cy="28" rx="12" ry="14"/>
      <ellipse class="paw-full"  cx="63" cy="28" rx="12" ry="14"/>
      <ellipse class="paw-full"  cx="81" cy="43" rx="12" ry="14"/>
    </svg>`;
    div.addEventListener('click', () => {
      const t = DB.toggleTodo(id);
      if (t.state === 'done') launchConfetti();
      refresh();
      toast(t.state === 'done' ? '🐾 Feta!' : '↩ De tornada');
    });
    return div;
  },

  /* ── Main render ────────────────────────────────────────── */
  render() {
    /* Route to kanban if needed */
    if (this.view === 'kanban') { this.renderKanban(); return; }

    const list = $('todo-items');
    const tod  = today();
    let todos  = DB.getTodos();

    /* Search filter */
    if (this.searchQuery) {
      const q = this.searchQuery.toLowerCase();
      todos = todos.filter(t => t.text.toLowerCase().includes(q));
    }

    /* State filter */
    switch (this.stateFilter) {
      case 'todo'      : todos = todos.filter(t => t.state==='todo'); break;
      case 'inprogress': todos = todos.filter(t => t.state==='inprogress'); break;
      case 'inreview'  : todos = todos.filter(t => t.state==='inreview'); break;
      case 'done'      : todos = todos.filter(t => t.state==='done'); break;
      case 'overdue'   : todos = todos.filter(t => t.state!=='done' && t.date && t.date < tod); break;
      case 'today'     : todos = todos.filter(t => t.date===tod); break;
      case 'day'       : todos = todos.filter(t => t.date===Calendar.selectedDay); break;
    }

    /* Tag filter */
    if (this.activeTag) {
      todos = todos.filter(t => t.tags && t.tags.split(',').includes(this.activeTag));
    }

    /* List filter */
    if (Lists.active !== null) {
      todos = todos.filter(t => t.list_id === Lists.active);
    }

    /* Sort */
    const priOrder = { urgent:0, high:1, normal:2, low:3 };
    const stOrder  = { inprogress:0, inreview:1, todo:2, done:3 };
    const dir      = this.sortAsc ? 1 : -1;
    todos.sort((a, b) => {
      let r = 0;
      switch (this.sortBy) {
        case 'priority': r = (priOrder[a.priority]??2) - (priOrder[b.priority]??2); break;
        case 'state'   : r = (stOrder[a.state]??2)    - (stOrder[b.state]??2);     break;
        case 'due': {
          if (a.date && b.date) r = a.date.localeCompare(b.date);
          else if (a.date) r = -1;
          else if (b.date) r = 1;
          break;
        }
        case 'alpha': r = a.text.localeCompare(b.text); break;
        default      : r = a.createdAt.localeCompare(b.createdAt); break;
      }
      return r * dir;
    });

    this.updateFilterCounts();

    list.innerHTML = '';

    if (todos.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <svg width="56" height="44" viewBox="0 0 150 100" fill="rgba(200,146,42,.22)">
          <ellipse cx="75" cy="95" rx="72" ry="44"/>
          <ellipse cx="48" cy="54" rx="21" ry="20" fill="#F2EAD8" opacity=".5"/>
          <ellipse cx="102" cy="54" rx="21" ry="20" fill="#F2EAD8" opacity=".5"/>
          <ellipse cx="48" cy="54" rx="12" ry="11.5" fill="#C8922A" opacity=".6"/>
          <ellipse cx="102" cy="54" rx="12" ry="11.5" fill="#C8922A" opacity=".6"/>
          <circle cx="43" cy="48" r="3" fill="white" opacity=".6"/>
          <circle cx="97" cy="48" r="3" fill="white" opacity=".6"/>
        </svg>
        <p>Res per fer. En Klaus aprova.</p>
      </div>`;
      return;
    }

    todos.forEach(todo => {
      const isOverdue = todo.state!=='done' && todo.date && todo.date < tod;
      const s = STATES[todo.state] || STATES.todo;

      /* ── Container ─ */
      const el = document.createElement('div');
      el.className = `todo-item p-${todo.priority}${todo.state==='done'?' completed':''}${isOverdue?' overdue':''}`;
      el.style.borderLeftColor = todo.color || s.border;

      /* ── Checkbox ─ */
      el.appendChild(this.makePawChk(todo.id, todo.state==='done'));

      /* ── Body ─ */
      const body = document.createElement('div');
      body.className = 'todo-body';

      /* Top row */
      const topRow = document.createElement('div');
      topRow.className = 'todo-top';

      const txt = document.createElement('span');
      txt.className   = 'todo-text';
      txt.textContent = todo.text;
      topRow.appendChild(txt);

      /* Meta row */
      const meta = document.createElement('div');
      meta.className = 'todo-meta';

      meta.appendChild(this.makeStateBadge(todo));
      meta.appendChild(this.makePrioBadge(todo));

      if (isOverdue) {
        const b = document.createElement('span');
        b.className = 'badge-overdue';
        b.textContent = '⚠ Vençuda';
        meta.appendChild(b);
      }

      if (todo.list_id) {
        const lst = DB.getLists().find(l => l.id === todo.list_id);
        if (lst) {
          const b = document.createElement('span');
          b.className = 'badge-list';
          b.style.cssText = `background:${lst.color}1a;color:${lst.color};`;
          b.textContent = `${lst.emoji} ${lst.name}`;
          meta.appendChild(b);
        }
      }

      if (todo.tags) {
        todo.tags.split(',').filter(Boolean).forEach(key => {
          const t = TAGS[key]; if (!t) return;
          const pill = document.createElement('span');
          pill.className   = `tag-pill tag-${key}`;
          pill.textContent = `${t.emoji} ${t.label}`;
          meta.appendChild(pill);
        });
      }

      if (todo.time) {
        const b = document.createElement('span');
        b.className = 'todo-badge badge-time';
        b.textContent = todo.time;
        meta.appendChild(b);
      }

      if (todo.date) {
        const b = document.createElement('span');
        b.className = 'todo-badge badge-date';
        b.textContent = fmtShort(todo.date);
        meta.appendChild(b);
      }

      topRow.appendChild(meta);

      /* Actions: assignee avatar + expand + delete */
      const actions = document.createElement('div');
      actions.className = 'todo-actions';

      if (todo.assignee) {
        const user = DB.getUsers().find(u => u.id === todo.assignee);
        if (user) {
          const av = document.createElement('div');
          av.className   = 'assignee-avatar';
          av.style.background = user.color;
          av.title       = user.name;
          av.textContent = user.initials;
          actions.appendChild(av);
        }
      }

      const expandBtn = document.createElement('button');
      expandBtn.className   = 'expand-btn';
      expandBtn.title       = 'Notes';
      expandBtn.textContent = '▾';

      const delBtn = document.createElement('button');
      delBtn.className   = 'del-btn';
      delBtn.title       = 'Eliminar';
      delBtn.textContent = '×';
      delBtn.addEventListener('click', () => {
        el.classList.add('removing');
        setTimeout(() => { DB.deleteTodo(todo.id); refresh(); }, 280);
      });

      actions.appendChild(expandBtn);
      actions.appendChild(delBtn);
      topRow.appendChild(actions);

      body.appendChild(topRow);

      /* Detail: notes textarea */
      const detail = document.createElement('div');
      detail.className = `todo-detail${todo.notes ? ' open' : ''}`;
      if (todo.notes) expandBtn.classList.add('open');

      const noteArea = document.createElement('textarea');
      noteArea.className   = 'note-area';
      noteArea.placeholder = 'Afegir notes…';
      noteArea.value       = todo.notes || '';

      let noteTimer;
      noteArea.addEventListener('input', () => {
        clearTimeout(noteTimer);
        noteTimer = setTimeout(() => DB.updateTodo(todo.id, { notes: noteArea.value }), 700);
      });

      detail.appendChild(noteArea);
      body.appendChild(detail);
      el.appendChild(body);

      expandBtn.addEventListener('click', () => {
        const open = detail.classList.toggle('open');
        expandBtn.classList.toggle('open', open);
        if (open) noteArea.focus();
      });

      list.appendChild(el);
    });
  },

  /* ── Add ────────────────────────────────────────────────── */
  add() {
    const inp  = $('todo-input');
    const text = inp.value.trim();
    if (!text) {
      inp.classList.add('shake');
      inp.addEventListener('animationend', () => inp.classList.remove('shake'), { once:true });
      inp.focus();
      return;
    }
    const asel = $('todo-assignee');
    DB.addTodo(
      text,
      $('todo-date').value     || null,
      $('todo-priority').value,
      '',
      this._selTags.join(','),
      this._selColor           || null,
      $('todo-time').value     || null,
      $('todo-list').value     || null,
      $('todo-state').value    || 'todo',
      asel ? (asel.value || null) : null
    );
    this.resetForm();
    refresh();
    toast('🐾 Tasca afegida!');
  },

  setFilter(f, resetDay = true) {
    this.stateFilter = f;
    if (resetDay && f !== 'day') {
      Calendar.selectedDay = null;
      $('quick-add').style.display = 'none';
      $('sel-info').textContent = 'Selecciona un dia per veure o afegir tasques';
    }
    Calendar.render();
    this.render();
  },

  /* ── View switcher ──────────────────────────────────────── */
  setView(v) {
    this.view = v;
    document.querySelectorAll('.vt-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
    const isKanban = v === 'kanban';
    $('todo-items').style.display       = isKanban ? 'none'  : '';
    $('kanban-board').style.display     = isKanban ? 'flex'  : 'none';
    $('state-filter-row').style.display = isKanban ? 'none'  : '';
    this.render();
  },

  /* ── Kanban board ───────────────────────────────────────── */
  renderKanban() {
    const board = $('kanban-board');
    const tod   = today();
    let todos   = DB.getTodos();

    /* Filters (search + tag + list) */
    if (this.searchQuery) {
      const q = this.searchQuery.toLowerCase();
      todos = todos.filter(t => t.text.toLowerCase().includes(q));
    }
    if (this.activeTag) {
      todos = todos.filter(t => t.tags && t.tags.split(',').includes(this.activeTag));
    }
    if (Lists.active !== null) {
      todos = todos.filter(t => t.list_id === Lists.active);
    }

    /* Sort within columns */
    const priOrder = { urgent:0, high:1, normal:2, low:3 };
    const dir = this.sortAsc ? 1 : -1;
    todos.sort((a, b) => {
      let r = 0;
      switch (this.sortBy) {
        case 'priority': r = (priOrder[a.priority]??2) - (priOrder[b.priority]??2); break;
        case 'due': {
          if (a.date && b.date) r = a.date.localeCompare(b.date);
          else if (a.date) r = -1; else if (b.date) r = 1; break;
        }
        case 'alpha': r = a.text.localeCompare(b.text); break;
        default: r = a.createdAt.localeCompare(b.createdAt); break;
      }
      return r * dir;
    });

    this.updateFilterCounts();
    board.innerHTML = '';
    let draggingId = null;

    Object.entries(STATES).forEach(([stateKey, st]) => {
      const colTodos = todos.filter(t => t.state === stateKey);

      const col = document.createElement('div');
      col.className = 'kanban-col';
      col.dataset.state = stateKey;

      /* Header */
      const hdr = document.createElement('div');
      hdr.className = 'kanban-col-hdr';
      hdr.style.color = st.color;
      hdr.innerHTML = `<span>${st.icon}</span><span>${st.label}</span><span class="kanban-col-count">${colTodos.length}</span>`;
      col.appendChild(hdr);

      /* Body */
      const body = document.createElement('div');
      body.className = 'kanban-col-body';

      if (colTodos.length === 0) {
        const emp = document.createElement('div');
        emp.className = 'kanban-empty';
        emp.textContent = 'Cap tasca aquí';
        body.appendChild(emp);
      } else {
        colTodos.forEach(todo => {
          const isOverdue = todo.state !== 'done' && todo.date && todo.date < tod;
          const p = PRIORITIES[todo.priority] || PRIORITIES.normal;

          const card = document.createElement('div');
          card.className  = 'kanban-card';
          card.draggable  = true;
          card.dataset.id = todo.id;
          card.style.borderLeftColor = todo.color || p.color;

          /* Text */
          const textEl = document.createElement('div');
          textEl.className   = 'kanban-card-text';
          textEl.textContent = todo.text;
          card.appendChild(textEl);

          /* Meta */
          const meta = document.createElement('div');
          meta.className = 'kanban-card-meta';

          const pb = document.createElement('span');
          pb.className = 'prio-badge';
          pb.style.cssText = `color:${p.color};background:${p.bg};border-color:${p.border};font-size:.62rem;padding:.08rem .3rem;gap:.2rem`;
          pb.innerHTML = `${p.icon} ${p.label}`;
          meta.appendChild(pb);

          if (isOverdue) {
            const ob = document.createElement('span');
            ob.className   = 'badge-overdue';
            ob.style.fontSize = '.62rem';
            ob.textContent = '⚠';
            meta.appendChild(ob);
          }
          if (todo.date) {
            const db = document.createElement('span');
            db.className   = 'todo-badge badge-date';
            db.style.fontSize = '.62rem';
            db.textContent = fmtShort(todo.date);
            meta.appendChild(db);
          }
          if (todo.assignee) {
            const user = DB.getUsers().find(u => u.id === todo.assignee);
            if (user) {
              const av = document.createElement('div');
              av.className = 'assignee-avatar';
              av.style.cssText = `background:${user.color};margin-left:auto`;
              av.title = user.name;
              av.textContent = user.initials;
              meta.appendChild(av);
            }
          }
          card.appendChild(meta);

          /* Drag events */
          card.addEventListener('dragstart', e => {
            draggingId = todo.id;
            card.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', todo.id);
          });
          card.addEventListener('dragend', () => {
            card.classList.remove('dragging');
            draggingId = null;
            board.querySelectorAll('.drop-target').forEach(c => c.classList.remove('drop-target'));
          });

          body.appendChild(card);
        });
      }

      /* Drop zone */
      col.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        col.classList.add('drop-target');
      });
      col.addEventListener('dragleave', e => {
        if (!col.contains(e.relatedTarget)) col.classList.remove('drop-target');
      });
      col.addEventListener('drop', e => {
        e.preventDefault();
        col.classList.remove('drop-target');
        const id = e.dataTransfer.getData('text/plain') || draggingId;
        if (id) {
          DB.setState(id, stateKey);
          if (stateKey === 'done') launchConfetti();
          refresh();
        }
      });

      col.appendChild(body);
      board.appendChild(col);
    });
  },

  clearCompleted() {
    const count = DB.getTodos().filter(t => t.state==='done' || t.completed).length;
    if (!count) { toast('Cap tasca feta per eliminar'); return; }
    DB.clearCompleted();
    refresh();
    toast(`💛 Eliminades ${count} tasca${count>1?'ques':''}`);
  },
};

/* ─── STATS ──────────────────────────────────────────────────── */
const Stats = {
  render() {
    const s = DB.getStats();
    $('s-total').textContent      = s.total;
    $('s-pending').textContent    = s.pending;
    $('s-done').textContent       = s.completed;
    $('s-inprogress').textContent = s.inprogress;
    $('s-overdue').textContent    = s.overdue;
    $('s-today').textContent      = s.today;
  },
};

/* ─── LISTS ──────────────────────────────────────────────────── */
const Lists = {
  active    : null,   // active list_id filter (null = all)
  _selEmoji : '📋',
  _selColor : '#C8922A',
  _formOpen : false,

  render() {
    const container = $('lists-container');
    const lists     = DB.getLists();
    const todos     = DB.getTodos();
    container.innerHTML = '';

    /* "Totes" button */
    const allBtn = document.createElement('button');
    allBtn.className   = 'list-all-btn' + (this.active===null ? ' active' : '');
    allBtn.innerHTML   = '📋 <span>Totes les tasques</span>';
    allBtn.addEventListener('click', () => { this.select(null); });
    container.appendChild(allBtn);

    /* List items */
    lists.forEach(list => {
      const count = todos.filter(t => t.list_id === list.id && !t.completed).length;
      const item  = document.createElement('div');
      item.className = 'list-item' + (this.active===list.id ? ' active' : '');
      item.style.color = list.color;

      item.innerHTML = `
        <span class="list-item-emoji">${list.emoji}</span>
        <span class="list-item-name">${this._esc(list.name)}</span>
        <span class="list-count">${count}</span>
        <button class="list-del-btn" title="Eliminar llista">×</button>
      `;
      item.querySelector('.list-del-btn').addEventListener('click', e => {
        e.stopPropagation();
        if (this.active === list.id) this.select(null);
        DB.deleteList(list.id);
        this.render();
        this._populateSelect();
        refresh();
        toast(`🗑 "${list.name}" eliminada`);
      });
      item.addEventListener('click', () => this.select(list.id));
      container.appendChild(item);
    });
  },

  select(id) {
    this.active = id;
    this.render();
    Todos.render();
  },

  _esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  },

  openForm() {
    this._formOpen = true;
    this._selEmoji = '📋';
    this._selColor = '#C8922A';
    $('list-name-input').value = '';
    $('list-create-form').classList.add('open');
    /* reset emoji */
    document.querySelectorAll('.list-emoji-opt').forEach(b =>
      b.classList.toggle('sel', b.dataset.emoji === '📋')
    );
    /* reset color */
    document.querySelectorAll('#list-color-row .color-dot').forEach(d =>
      d.classList.toggle('sel', d.dataset.color === '#C8922A')
    );
    $('list-name-input').focus();
  },

  closeForm() {
    this._formOpen = false;
    $('list-create-form').classList.remove('open');
  },

  selectEmoji(emoji) {
    this._selEmoji = emoji;
    document.querySelectorAll('.list-emoji-opt').forEach(b =>
      b.classList.toggle('sel', b.dataset.emoji === emoji)
    );
  },

  selectColor(color) {
    this._selColor = color;
    document.querySelectorAll('#list-color-row .color-dot').forEach(d =>
      d.classList.toggle('sel', d.dataset.color === color)
    );
  },

  save() {
    const name = $('list-name-input').value.trim();
    if (!name) { $('list-name-input').focus(); return; }
    DB.addList(name, this._selEmoji, this._selColor);
    this.closeForm();
    this.render();
    this._populateSelect();
    toast(`📋 "${name}" creada!`);
  },

  _populateSelect() {
    const sel   = $('todo-list');
    const curVal = sel.value;
    const lists  = DB.getLists();
    sel.innerHTML = '<option value="">📋 Cap llista</option>';
    lists.forEach(l => {
      const opt = document.createElement('option');
      opt.value       = l.id;
      opt.textContent = `${l.emoji} ${l.name}`;
      sel.appendChild(opt);
    });
    /* Restore previous selection if still valid */
    if (curVal && lists.find(l => l.id === curVal)) sel.value = curVal;
  },
};

/* ─── USERS ──────────────────────────────────────────────────── */
const Users = {
  _colors: ['#E8A030','#60A5FA','#4ADE80','#C084FC','#FB923C','#F472B6','#34D399','#FBBF24'],
  _colorIdx: 0,

  render() {
    const container = $('user-list');
    if (!container) return;
    const users = DB.getUsers();
    container.innerHTML = '';

    if (users.length === 0) {
      container.innerHTML = `<div style="font-size:.75rem;color:var(--text-dim);padding:.25rem 0">Sense assignats encara</div>`;
    }

    users.forEach(user => {
      const item = document.createElement('div');
      item.className = 'user-item';
      item.innerHTML = `
        <div class="user-avatar-lg" style="background:${user.color}">${user.initials}</div>
        <span class="user-name">${this._esc(user.name)}</span>
        <button class="user-del" title="Eliminar">×</button>
      `;
      item.querySelector('.user-del').addEventListener('click', () => {
        DB.deleteUser(user.id);
        this.render();
        this._populateSelect();
        refresh();
        toast(`👤 "${user.name}" eliminat`);
      });
      container.appendChild(item);
    });
  },

  add() {
    const inp  = $('user-add-input');
    const name = inp.value.trim();
    if (!name) { inp.focus(); return; }
    const color = this._colors[this._colorIdx++ % this._colors.length];
    DB.addUser(name, color);
    inp.value = '';
    this.render();
    this._populateSelect();
    toast(`👤 "${name}" afegit!`);
  },

  _populateSelect() {
    const sel = $('todo-assignee');
    if (!sel) return;
    const curVal = sel.value;
    const users  = DB.getUsers();
    sel.innerHTML = '<option value="">— Sense assignar —</option>';
    users.forEach(u => {
      const opt = document.createElement('option');
      opt.value       = u.id;
      opt.textContent = `${u.initials} ${u.name}`;
      sel.appendChild(opt);
    });
    if (curVal && users.find(u => u.id === curVal)) sel.value = curVal;
  },

  _esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  },
};

/* ─── CONFETTI ───────────────────────────────────────────────── */
function launchConfetti() {
  const colors = ['#E8A030','#60A5FA','#4ADE80','#C084FC','#FB923C','#F472B6','#FBBF24'];
  const count  = 60;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    const size = 6 + Math.random() * 8;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const x = Math.random() * window.innerWidth;
    const dur = 900 + Math.random() * 600;
    p.style.cssText = `
      position:fixed;top:-10px;left:${x}px;width:${size}px;height:${size}px;
      background:${color};border-radius:${Math.random()>.5?'50%':'2px'};
      pointer-events:none;z-index:9999;opacity:1;
      animation:confettiFall ${dur}ms ease-in forwards;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), dur + 100);
  }
}

/* ─── PHOTOS ─────────────────────────────────────────────────── */
const Photos = {
  render() {
    const grid = $('photo-grid'), photos = DB.getPhotos(), full = photos.length>=DB.MAX_PHOTOS;
    grid.innerHTML = '';
    photos.forEach(photo => {
      const item = document.createElement('div');
      item.className = 'photo-item';
      item.innerHTML = `<img src="${photo.src}" alt="Klaus" loading="lazy"/>
        <button class="del-ph" title="Eliminar foto">×</button>`;
      item.querySelector('.del-ph').addEventListener('click', e => {
        e.stopPropagation(); DB.deletePhoto(photo.id); this.render(); toast('Foto eliminada');
      });
      grid.appendChild(item);
    });
    if (!full) {
      const add = document.createElement('div');
      add.className = 'photo-add';
      add.innerHTML = `<span class="pa-icon">📷</span><span class="pa-txt">Afegir foto</span>`;
      add.addEventListener('click', () => $('file-input').click());
      grid.appendChild(add);
    }
    $('photos-full').style.display = full ? 'block' : 'none';
  },
  handleFiles(files) {
    const canAdd = DB.MAX_PHOTOS - DB.getPhotos().length;
    if (!canAdd) { toast('Has arribat al màxim de 9 fotos'); return; }
    let added = 0;
    files.slice(0, canAdd).forEach(file => {
      const r = new FileReader();
      r.onload = e => {
        DB.addPhoto(e.target.result); added++;
        if (added===Math.min(files.length,canAdd)) { this.render(); toast(`📷 ${added} foto${added>1?'grafies':'grafia'} afegida${added>1?'des':''}`); }
      };
      r.readAsDataURL(file);
    });
    $('file-input').value='';
  },
};

/* ─── REFRESH ────────────────────────────────────────────────── */
function refresh() { Calendar.render(); Todos.render(); Stats.render(); Lists.render(); Users.render(); }

/* ─── EVENT BINDING ──────────────────────────────────────────── */
function bindEvents() {
  let miIdx = 0;
  $('logo').addEventListener('click', () => toast(MISSATGES[miIdx++%MISSATGES.length]));
  $('prev-month').addEventListener('click', () => Calendar.prevMonth());
  $('next-month').addEventListener('click', () => Calendar.nextMonth());
  $('qa-btn').addEventListener('click',     () => Calendar.quickAdd());
  $('qa-input').addEventListener('keydown', e => { if(e.key==='Enter') Calendar.quickAdd(); });
  $('add-btn').addEventListener('click',    () => Todos.add());
  $('todo-input').addEventListener('keydown', e => { if(e.key==='Enter') Todos.add(); });
  $('clear-btn').addEventListener('click',  () => Todos.clearCompleted());
  $('file-input').addEventListener('change', () => Photos.handleFiles(Array.from($('file-input').files)));

  /* Search */
  const searchInp = $('search-input');
  if (searchInp) searchInp.addEventListener('input', () => {
    Todos.searchQuery = searchInp.value.trim();
    Todos.render();
  });

  /* View toggle */
  document.querySelectorAll('.vt-btn').forEach(b =>
    b.addEventListener('click', () => Todos.setView(b.dataset.view))
  );

  /* State filter chips */
  document.querySelectorAll('.sf-btn').forEach(b =>
    b.addEventListener('click', () => Todos.setFilter(b.dataset.sf))
  );

  /* Sort controls */
  const sortSel = $('sort-select');
  const sortDir = $('sort-dir');
  if (sortSel) sortSel.addEventListener('change', () => {
    Todos.sortBy = sortSel.value;
    Todos.render();
  });
  if (sortDir) sortDir.addEventListener('click', () => {
    Todos.sortAsc = !Todos.sortAsc;
    sortDir.textContent = Todos.sortAsc ? '↓' : '↑';
    Todos.render();
  });

  /* Tag toggles in add form */
  document.querySelectorAll('.tag-toggle').forEach(b =>
    b.addEventListener('click', () => Todos.toggleAddTag(b.dataset.tag))
  );

  /* Color dots (task add form only) */
  document.querySelectorAll('#color-picker .color-dot').forEach(d =>
    d.addEventListener('click', () => Todos.selectColor(d.dataset.color))
  );

  /* Lists */
  $('list-new-btn').addEventListener('click', () => Lists.openForm());
  $('list-cancel-btn').addEventListener('click', () => Lists.closeForm());
  $('list-save-btn').addEventListener('click', () => Lists.save());
  $('list-name-input').addEventListener('keydown', e => { if (e.key==='Enter') Lists.save(); });
  document.querySelectorAll('.list-emoji-opt').forEach(b =>
    b.addEventListener('click', () => Lists.selectEmoji(b.dataset.emoji))
  );
  document.querySelectorAll('#list-color-row .color-dot').forEach(d =>
    d.addEventListener('click', () => Lists.selectColor(d.dataset.color))
  );

  /* Users */
  const uBtn = $('user-add-btn');
  const uInp = $('user-add-input');
  if (uBtn) uBtn.addEventListener('click', () => Users.add());
  if (uInp) uInp.addEventListener('keydown', e => { if (e.key==='Enter') Users.add(); });

  /* Close state/prio dropdowns on outside click */
  document.addEventListener('click', () => {
    document.querySelectorAll('.state-menu.open,.prio-menu.open').forEach(m => m.classList.remove('open'));
  });
}

/* ═══════════════════════════════════════════════════════════════
   CURSOR PET
═══════════════════════════════════════════════════════════════ */
(() => {
  const el=document.getElementById('wdog'), bub=document.getElementById('dog-bubble'), svg=el.querySelector('svg');
  const SPD_WALK=2.2,SPD_RUN=7.0,ACCEL=.28,D_SIT=48,D_RUN=120,IDLE_MS=3500;
  const WOOFS=['🐾 Bau!','💛!','🦴 Woof!','👋 Hola!','🐕 Au!','✨ Grr!'];
  const SNIFFS=['👃...','🐽 sniff'];
  let woofIdx=0, x=180, y=window.innerHeight*.65, vx=0, vy=0, facing=1, mode='follow', dogState='sit';
  const mouse={x:window.innerWidth/2,y:window.innerHeight/2};
  let mouseLastMove=Date.now(),idleTarget=null,bubTimer=null,nextAction=null;
  const randTarget=()=>({x:80+Math.random()*(window.innerWidth-160),y:80+Math.random()*(window.innerHeight-160)});
  function setClass(c){const t=el.classList.contains('talking');el.className=c+(t?' talking':'');dogState=c;}
  function bubble(txt,ms=1800){bub.textContent=txt;el.classList.add('talking');clearTimeout(bubTimer);bubTimer=setTimeout(()=>el.classList.remove('talking'),ms);}
  function scheduleAction(fn,ms){clearTimeout(nextAction);nextAction=setTimeout(fn,ms);}
  document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouseLastMove=Date.now();if(mode==='idle'){mode='follow';clearTimeout(nextAction);}});
  document.addEventListener('dblclick',e=>{if(e.target.closest('button,input,select,a,.chk,.cal-day'))return;mouse.x=e.clientX;mouse.y=e.clientY;mouseLastMove=Date.now();bubble(WOOFS[woofIdx++%WOOFS.length]);});
  function update(){
    const W=window.innerWidth,H=window.innerHeight,now=Date.now();
    if(mode==='follow'&&now-mouseLastMove>IDLE_MS){mode='idle';idleTarget=randTarget();}
    let tx,ty;
    if(mode==='follow'){tx=mouse.x;ty=mouse.y;}else{if(!idleTarget)idleTarget=randTarget();tx=idleTarget.x;ty=idleTarget.y;}
    const dx=tx-x,dy=ty-y,d=Math.hypot(dx,dy);
    if(d<D_SIT&&mode==='follow'){vx*=.78;vy*=.78;if(dogState!=='sit')setClass('sit');}
    else if(d<8&&mode==='idle'){vx=0;vy=0;setClass('idle');scheduleAction(()=>{if(mode!=='idle')return;if(Math.random()<.4){setClass('sniff');bubble(SNIFFS[Math.floor(Math.random()*SNIFFS.length)],1200);scheduleAction(()=>{idleTarget=randTarget();},1400);}else{idleTarget=randTarget();}},800+Math.random()*1400);}
    else{const spd=mode==='follow'&&d>D_RUN?SPD_RUN:SPD_WALK;vx+=(dx/d)*spd*ACCEL;vy+=(dy/d)*spd*ACCEL;const cur=Math.hypot(vx,vy);if(cur>spd){vx=(vx/cur)*spd;vy=(vy/cur)*spd;}setClass(cur>3.5?'run':'walk');}
    x+=vx;y+=vy;
    const p=50;
    if(x<p){x=p;vx=Math.abs(vx)*.4;if(mode==='idle')idleTarget=randTarget();}
    if(x>W-p){x=W-p;vx=-Math.abs(vx)*.4;if(mode==='idle')idleTarget=randTarget();}
    if(y<60){y=60;vy=Math.abs(vy)*.4;}
    if(y>H-10){y=H-10;vy=-Math.abs(vy)*.4;}
    const spd=Math.hypot(vx,vy);if(spd>.3&&Math.abs(vx)>.2)facing=vx>0?1:-1;
    el.style.left=(x-28)+'px';el.style.top=(y-36)+'px';svg.style.transform=`scaleX(${facing})`;
    requestAnimationFrame(update);
  }
  update();
})();
